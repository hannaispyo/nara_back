<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>NARA BACK · Admin</title>
<style>
  :root { --lime:#CBFD51; --bg:#0b0b0b; --panel:#141414; --line:#2a2a2a; --muted:#8a8a8a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  a { color:var(--lime); }
  header { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 18px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:10; }
  header h1 { font-size:16px; margin:0; letter-spacing:.04em; }
  .tag { color:var(--lime); }
  button { font:inherit; cursor:pointer; border:none; border-radius:8px; }
  .btn { background:var(--lime); color:#000; font-weight:700; padding:10px 16px; }
  .btn.ghost { background:transparent; color:#fff; border:1px solid var(--line); }
  .btn:disabled { opacity:.5; cursor:default; }
  .wrap { max-width:900px; margin:0 auto; padding:20px 18px 90px; }
  .tabs { display:flex; gap:8px; margin:18px 0; }
  .tabs button { background:var(--panel); color:#fff; border:1px solid var(--line); padding:8px 14px; }
  .tabs button.active { background:var(--lime); color:#000; border-color:var(--lime); font-weight:700; }
  .group { border:1px solid var(--line); border-radius:12px; margin-bottom:14px; overflow:hidden; }
  .group > summary { list-style:none; cursor:pointer; padding:14px 16px; background:var(--panel); font-weight:700; display:flex; justify-content:space-between; }
  .group[open] > summary { border-bottom:1px solid var(--line); }
  .field { padding:12px 16px; border-top:1px solid #1c1c1c; }
  .field:first-of-type { border-top:none; }
  .field label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
  .field input[type=text], .field input[type=url], .field textarea {
    width:100%; background:#0c0c0c; border:1px solid var(--line); color:#fff; border-radius:8px; padding:10px 12px; font:inherit; }
  .field textarea { min-height:70px; resize:vertical; }
  .imgrow { display:flex; gap:12px; align-items:center; }
  .imgrow .thumb { width:56px; height:56px; border-radius:8px; border:1px solid var(--line); object-fit:cover; background:#000; flex:none; }
  .imgrow .col { flex:1; min-width:0; }
  .savebar { position:fixed; bottom:0; left:0; right:0; background:#111; border-top:1px solid var(--line); padding:12px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .savebar .status { color:var(--muted); font-size:13px; }
  .center { max-width:360px; margin:12vh auto; padding:0 18px; text-align:center; }
  .center input { width:100%; background:#0c0c0c; border:1px solid var(--line); color:#fff; border-radius:8px; padding:12px; font:inherit; margin:8px 0; }
  .msg { border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:12px; background:var(--panel); }
  .msg.unread { border-color:var(--lime); }
  .msg .top { display:flex; justify-content:space-between; gap:10px; font-size:13px; color:var(--muted); }
  .msg .name { color:#fff; font-weight:700; }
  .msg .body { margin:8px 0; white-space:pre-wrap; }
  .msg .acts { display:flex; gap:8px; flex-wrap:wrap; }
  .msg .acts button { background:#1e1e1e; color:#fff; border:1px solid var(--line); padding:6px 10px; font-size:12px; }
  .hidden { display:none !important; }
  .err { color:#ff6b6b; }
  .note { color:var(--muted); font-size:12px; }
  /* ── Editor de secciones ── */
  .sec { border:1px solid var(--line); border-radius:12px; margin-bottom:12px; background:var(--panel); overflow:hidden; }
  .sec.off { opacity:.55; }
  .sec__bar { display:flex; align-items:center; gap:10px; padding:11px 14px; }
  .sec__type { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#000; background:var(--lime); padding:2px 7px; border-radius:4px; font-weight:700; flex:none; }
  .sec__name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:700; }
  .sec__bar button { background:#1e1e1e; color:#fff; border:1px solid var(--line); padding:6px 9px; font-size:12px; }
  .sec__body { padding:0 14px 14px; border-top:1px solid #1c1c1c; }
  .sec__body .field { padding:10px 0; border:0; }
  .sec__imgs { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .sec__img { border:1px solid var(--line); border-radius:8px; padding:8px; }
  .sec__img img { width:100%; height:74px; object-fit:cover; border-radius:6px; background:#000; display:block; margin-bottom:6px; }
  .addbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:4px 0 16px; }
  .addbar select { background:#0c0c0c; border:1px solid var(--line); color:#fff; border-radius:8px; padding:9px 11px; font:inherit; }
</style>
</head>
<body>
<header>
  <h1>NARA <span class="tag">BACK</span> · Admin</h1>
  <div id="whoami" class="note"></div>
</header>

<div id="login" class="center hidden">
  <h2>Entrar</h2>
  <p id="login-note" class="note"></p>
  <input id="email" type="email" placeholder="email" autocomplete="username">
  <input id="password" type="password" placeholder="contraseña" autocomplete="current-password">
  <button class="btn" id="login-btn" style="width:100%">Entrar</button>
  <p id="login-err" class="err"></p>
</div>

<div id="app" class="wrap hidden">
  <div class="tabs">
    <button id="tab-content" class="active">Contenido</button>
    <button id="tab-sections">Secciones</button>
    <button id="tab-inbox">Bandeja <span id="unread-badge"></span></button>
  </div>
  <div id="view-content"></div>
  <div id="view-sections" class="hidden"></div>
  <div id="view-inbox" class="hidden"></div>
</div>

<div id="savebar" class="savebar hidden">
  <span class="status" id="save-status"></span>
  <div>
    <button class="btn ghost" id="logout">Salir</button>
    <button class="btn" id="save">Guardar cambios</button>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
let spec = null, values = {}, me = null;

async function api(path, opts) {
  const r = await fetch(path, Object.assign({ credentials: 'same-origin' }, opts));
  let j = null; try { j = await r.json(); } catch {}
  return { ok: r.ok, status: r.status, j: j || {} };
}

async function boot() {
  const s = await api('/api/session');
  if (!s.j.configured) {
    $('#login').classList.remove('hidden');
    $('#login-note').innerHTML = '<span class="err">Backend sin configurar.</span> Definí AUTH_SECRET, ADMIN_EMAIL y ADMIN_PASSWORD_HASH en Vercel.';
    $('#login-btn').disabled = true;
    return;
  }
  if (s.j.authed) { me = s.j.email; enterApp(); } else showLogin();
}

function showLogin() {
  $('#app').classList.add('hidden'); $('#savebar').classList.add('hidden');
  $('#login').classList.remove('hidden');
}

$('#login-btn').addEventListener('click', async () => {
  $('#login-err').textContent = '';
  const res = await api('/api/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: $('#email').value.trim(), password: $('#password').value }),
  });
  if (!res.ok) { $('#login-err').textContent = res.j.error || 'Error'; return; }
  me = res.j.email; enterApp();
});

async function enterApp() {
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  $('#savebar').classList.remove('hidden');
  $('#whoami').textContent = me;
  const [specRes, contentRes] = await Promise.all([
    fetch('/content.spec.json').then(r => r.json()),
    api('/api/content'),
  ]);
  spec = specRes;
  values = (contentRes.j && contentRes.j.data) || {};
  renderContent();
  loadInbox();
}

function renderContent() {
  const root = $('#view-content'); root.innerHTML = '';
  spec.groups.forEach((g) => {
    const det = document.createElement('details'); det.className = 'group';
    const sum = document.createElement('summary');
    sum.innerHTML = `<span>${g.label}</span><span class="note">${g.fields.length} campos</span>`;
    det.appendChild(sum);
    g.fields.forEach((f) => det.appendChild(fieldEl(f)));
    root.appendChild(det);
  });
}

function fieldEl(f) {
  const d = document.createElement('div'); d.className = 'field';
  const cur = values[f.key];
  const placeholder = f.find || f.default || '';
  if (f.type === 'image') {
    d.innerHTML = `<label>${f.label}</label>
      <div class="imgrow">
        <img class="thumb" data-thumb="${f.key}" src="${cur || ''}" alt="">
        <div class="col">
          <input type="text" data-key="${f.key}" value="${escapeAttr(cur || '')}" placeholder="URL o subí un archivo →">
          <div style="margin-top:8px"><input type="file" accept="image/*" data-upload="${f.key}"></div>
        </div>
      </div>`;
  } else {
    const long = f.type === 'text' && (placeholder.length > 60 || /copy|bio/.test(f.key));
    const control = long
      ? `<textarea data-key="${f.key}" placeholder="${escapeAttr(placeholder)}">${escapeHtml(cur || '')}</textarea>`
      : `<input type="${f.type === 'url' ? 'url' : 'text'}" data-key="${f.key}" value="${escapeAttr(cur || '')}" placeholder="${escapeAttr(placeholder)}">`;
    d.innerHTML = `<label>${f.label}</label>${control}`;
  }
  return d;
}

$('#view-content').addEventListener('input', (e) => {
  const key = e.target.getAttribute('data-key');
  if (key != null) {
    values[key] = e.target.value;
    if (e.target.type === 'text' || e.target.type === 'url') {
      const th = document.querySelector(`[data-thumb="${key}"]`);
      if (th) th.src = e.target.value;
    }
  }
});

$('#view-content').addEventListener('change', async (e) => {
  const key = e.target.getAttribute('data-upload');
  if (!key || !e.target.files || !e.target.files[0]) return;
  const file = e.target.files[0];
  setStatus('Subiendo imagen…');
  const res = await api('/api/upload?name=' + encodeURIComponent(file.name), {
    method: 'POST', headers: { 'Content-Type': file.type || 'image/jpeg' }, body: file,
  });
  if (!res.ok) { setStatus('Error al subir: ' + (res.j.error || res.status), true); return; }
  values[key] = res.j.url;
  const input = document.querySelector(`input[data-key="${key}"]`);
  if (input) input.value = res.j.url;
  const th = document.querySelector(`[data-thumb="${key}"]`);
  if (th) th.src = res.j.url;
  setStatus('Imagen subida ✓');
});

$('#save').addEventListener('click', async () => {
  setStatus('Guardando…');
  const clean = {};
  Object.keys(values).forEach((k) => { if (values[k] !== '' && values[k] != null) clean[k] = values[k]; });
  const res = await api('/api/content', {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ data: clean }),
  });
  if (res.ok && res.j.ok) setStatus('Guardado ✓ — se refleja en el sitio al recargar.');
  else setStatus('Error: ' + (res.j.error || res.status), true);
});

async function loadInbox() {
  const res = await api('/api/messages');
  const view = $('#view-inbox');
  if (!res.ok) { view.innerHTML = `<p class="err">${res.j.error || 'Error'}</p>`; return; }
  $('#unread-badge').textContent = res.j.unread ? `(${res.j.unread})` : '';
  if (!res.j.messages.length) { view.innerHTML = '<p class="note">Sin mensajes todavía.</p>'; return; }
  view.innerHTML = '';
  res.j.messages.forEach((m) => view.appendChild(msgEl(m)));
}

function msgEl(m) {
  const d = document.createElement('div');
  d.className = 'msg' + (m.read ? '' : ' unread');
  const when = new Date(m.created_at).toLocaleString('es');
  d.innerHTML = `
    <div class="top"><span><span class="name">${escapeHtml(m.name)}</span> · <a href="mailto:${escapeAttr(m.email)}">${escapeHtml(m.email)}</a>${m.phone ? ' · ' + escapeHtml(m.phone) : ''}</span><span>${when}</span></div>
    ${m.subject ? `<div class="note">Asunto: ${escapeHtml(m.subject)}</div>` : ''}
    <div class="body">${escapeHtml(m.message)}</div>
    <div class="acts">
      <button data-act="read">${m.read ? 'Marcar no leído' : 'Marcar leído'}</button>
      <button data-act="archive">Archivar</button>
      <button data-act="delete">Borrar</button>
    </div>`;
  d.querySelector('[data-act=read]').onclick = () => patchMsg(m.id, { read: !m.read });
  d.querySelector('[data-act=archive]').onclick = () => patchMsg(m.id, { archived: true });
  d.querySelector('[data-act=delete]').onclick = () => { if (confirm('¿Borrar definitivamente?')) delMsg(m.id); };
  return d;
}

async function patchMsg(id, patch) {
  await api('/api/messages', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(Object.assign({ id }, patch)) });
  loadInbox();
}
async function delMsg(id) {
  await api('/api/messages', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
  loadInbox();
}

// ── Secciones del home ─────────────────────────────────────
const SEC_TYPES = { texto:'Texto', imagen:'Imagen + texto', galeria:'Galería', cta:'Llamado a la acción' };

function secs() { if (!Array.isArray(values.sections)) values.sections = []; return values.sections; }

function renderSections() {
  const root = $('#view-sections');
  const list = secs();
  root.innerHTML = '';

  const bar = document.createElement('div');
  bar.className = 'addbar';
  bar.innerHTML = `<select id="sec-type">${Object.keys(SEC_TYPES).map(k=>`<option value="${k}">${SEC_TYPES[k]}</option>`).join('')}</select>
    <button class="btn" id="sec-add">+ Añadir sección</button>
    <span class="note">Se muestran en el home, antes de la sección de booking.</span>`;
  root.appendChild(bar);
  bar.querySelector('#sec-add').onclick = () => {
    list.push({ id:'s'+Date.now(), type: bar.querySelector('#sec-type').value, visible:true,
      kicker:'', title:'', body:'', image:'', images:[], ctaLabel:'', ctaUrl:'', flip:false });
    renderSections();
  };

  if (!list.length) { root.insertAdjacentHTML('beforeend','<p class="note">Todavía no hay secciones propias. Añadí una arriba.</p>'); return; }

  list.forEach((s, i) => root.appendChild(secCard(s, i, list.length)));
}

function secCard(s, i, total) {
  const d = document.createElement('div');
  d.className = 'sec' + (s.visible === false ? ' off' : '');
  const barHtml = `<div class="sec__bar">
      <span class="sec__type">${SEC_TYPES[s.type] || s.type}</span>
      <span class="sec__name">${escapeHtml(s.title || '(sin título)')}</span>
      <button data-a="up" ${i===0?'disabled':''}>↑</button>
      <button data-a="down" ${i===total-1?'disabled':''}>↓</button>
      <button data-a="vis">${s.visible === false ? 'Mostrar' : 'Ocultar'}</button>
      <button data-a="del">Borrar</button>
    </div>`;

  let f = `<div class="field"><label>Etiqueta (kicker)</label><input type="text" data-s="${i}:kicker" value="${escapeAttr(s.kicker||'')}" placeholder="[ nueva sección ]"></div>
    <div class="field"><label>Título</label><input type="text" data-s="${i}:title" value="${escapeAttr(s.title||'')}"></div>
    <div class="field"><label>Texto</label><textarea data-s="${i}:body">${escapeHtml(s.body||'')}</textarea></div>`;

  if (s.type === 'imagen') {
    f += `<div class="field"><label>Imagen</label>
        <div class="imgrow"><img class="thumb" data-sthumb="${i}:image" src="${escapeAttr(s.image||'')}" alt="">
          <div class="col"><input type="text" data-s="${i}:image" value="${escapeAttr(s.image||'')}" placeholder="URL o subí un archivo →">
            <div style="margin-top:8px"><input type="file" accept="image/*" data-supload="${i}:image"></div></div></div></div>
      <div class="field"><label><input type="checkbox" data-scheck="${i}:flip" ${s.flip?'checked':''}> Imagen a la derecha (en pantallas anchas)</label></div>`;
  } else if (s.type === 'galeria') {
    const imgs = s.images || [];
    f += `<div class="field"><label>Imágenes (${imgs.length})</label><div class="sec__imgs">` +
      imgs.map((u,j)=>`<div class="sec__img"><img src="${escapeAttr(u)}" alt="">
          <input type="text" data-s="${i}:images:${j}" value="${escapeAttr(u)}" placeholder="URL">
          <div style="margin-top:6px;display:flex;gap:6px">
            <input type="file" accept="image/*" data-supload="${i}:images:${j}" style="flex:1;min-width:0">
            <button data-a="delimg" data-j="${j}" style="background:#1e1e1e;color:#fff;border:1px solid var(--line);padding:4px 8px;font-size:12px">✕</button>
          </div></div>`).join('') +
      `</div><button data-a="addimg" class="btn ghost" style="margin-top:10px">+ Imagen</button></div>`;
  } else if (s.type === 'cta') {
    f += `<div class="field"><label>Texto del botón</label><input type="text" data-s="${i}:ctaLabel" value="${escapeAttr(s.ctaLabel||'')}" placeholder="Escríbeme"></div>
      <div class="field"><label>Enlace del botón</label><input type="url" data-s="${i}:ctaUrl" value="${escapeAttr(s.ctaUrl||'')}" placeholder="https://…  o  #contact-form"></div>`;
  }

  d.innerHTML = barHtml + `<div class="sec__body">${f}</div>`;

  const list = secs();
  d.querySelector('[data-a=up]').onclick = () => { if(i>0){ [list[i-1],list[i]]=[list[i],list[i-1]]; renderSections(); } };
  d.querySelector('[data-a=down]').onclick = () => { if(i<list.length-1){ [list[i+1],list[i]]=[list[i],list[i+1]]; renderSections(); } };
  d.querySelector('[data-a=vis]').onclick = () => { list[i].visible = list[i].visible === false; renderSections(); };
  d.querySelector('[data-a=del]').onclick = () => { if(confirm('¿Borrar esta sección?')){ list.splice(i,1); renderSections(); } };
  const addImg = d.querySelector('[data-a=addimg]');
  if (addImg) addImg.onclick = () => { (list[i].images = list[i].images || []).push(''); renderSections(); };
  d.querySelectorAll('[data-a=delimg]').forEach(b => b.onclick = () => { list[i].images.splice(+b.dataset.j,1); renderSections(); });
  return d;
}

function setSecValue(path, val) {
  const p = path.split(':'), i = +p[0], list = secs();
  if (!list[i]) return;
  if (p[1] === 'images') { (list[i].images = list[i].images || [])[+p[2]] = val; }
  else list[i][p[1]] = val;
}

$('#view-sections').addEventListener('input', (e) => {
  const path = e.target.getAttribute('data-s');
  if (path == null) return;
  setSecValue(path, e.target.value);
  const th = document.querySelector(`[data-sthumb="${path}"]`);
  if (th) th.src = e.target.value;
});
$('#view-sections').addEventListener('change', async (e) => {
  const chk = e.target.getAttribute('data-scheck');
  if (chk) { const p = chk.split(':'); secs()[+p[0]][p[1]] = e.target.checked; return; }
  const path = e.target.getAttribute('data-supload');
  if (!path || !e.target.files || !e.target.files[0]) return;
  const file = e.target.files[0];
  setStatus('Subiendo imagen…');
  const res = await api('/api/upload?name=' + encodeURIComponent(file.name), {
    method: 'POST', headers: { 'Content-Type': file.type || 'image/jpeg' }, body: file });
  if (!res.ok) { setStatus('Error al subir: ' + (res.j.error || res.status), true); return; }
  setSecValue(path, res.j.url);
  setStatus('Imagen subida ✓');
  renderSections();
});

// ── tabs / util ────────────────────────────────────────────
$('#tab-content').onclick = () => switchTab('content');
$('#tab-sections').onclick = () => { switchTab('sections'); renderSections(); };
$('#tab-inbox').onclick = () => { switchTab('inbox'); loadInbox(); };
function switchTab(t) {
  $('#tab-content').classList.toggle('active', t === 'content');
  $('#tab-sections').classList.toggle('active', t === 'sections');
  $('#tab-inbox').classList.toggle('active', t === 'inbox');
  $('#view-content').classList.toggle('hidden', t !== 'content');
  $('#view-sections').classList.toggle('hidden', t !== 'sections');
  $('#view-inbox').classList.toggle('hidden', t !== 'inbox');
  $('#save').classList.toggle('hidden', t === 'inbox');
}
$('#logout').onclick = async () => { await api('/api/logout', { method: 'POST' }); location.reload(); };

function setStatus(t, err) { const s = $('#save-status'); s.textContent = t; s.className = 'status' + (err ? ' err' : ''); }
function escapeHtml(s) { return String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
function escapeAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

boot();
</script>
</body>
</html>
